name: CI

on:
  push:
  pull_request:

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      # Compile-gate the `tiled` feature so its Noop-buildable code can't rot
      # unnoticed (it is never in `default`). Backend-specific tiled code
      # (`tiled,metal` / `tiled,vulkan`) only compiles on a GPU host and is
      # gated in the local review workflow, not here.
      - name: Build (tiled)
        run: cargo build --workspace --features tiled
      - name: Test (tiled)
        run: cargo test --workspace --features tiled
      - name: Clippy (tiled)
        run: cargo clippy --workspace --features tiled --all-targets -- -D warnings
